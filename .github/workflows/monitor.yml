name: Market dip monitor

on:
  schedule:
    # Times are UTC. GitHub cron has no daylight-saving awareness, so we run a
    # few times around each open and let the script decide (it is timezone-aware)
    # which run actually fires the daily summary. State stops duplicate alerts.
    - cron: "20,50 7-8 * * 1-5"     # UK open window (covers BST and GMT)
    - cron: "20,50 13-15 * * 1-5"   # US open window: summary + index open capture
    - cron: "0,15 20-21 * * 1-5"    # US close window: index close capture (EDT/EST)
  workflow_dispatch: {}             # run manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
        run: node fear-greed-monitor.js
      - name: Persist data and state
        run: |
          git config user.name "dip-monitor"
          git config user.email "bot@users.noreply.github.com"
          git add state.json data.json
          git diff --staged --quiet || git commit -m "Update monitor data"
          git push
